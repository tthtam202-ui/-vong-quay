<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vòng Quay May Mắn (Lucky Wheel) - Giao diện Xanh</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            /* NEW: Blue Theme */
            --primary-color: #0ca1fa;
            --secondary-color: #0a8cd9;
            --accent-color: #e74c3c;
            --dark-text: #2c3e50;
            --light-text: #ffffff;
            --border-color: #ecf0f1;
            --bg-color: #ffffff;
            --bg-light-gray: #f7f9fa;
            --shadow: 0 6px 20px rgba(44, 62, 80, 0.1);

            /* NEW: Wheel colors for the blue theme */
            --wheel-color-light: #ecf0f1; /* Light gray for alternating segments */
            --wheel-color-dark: #0ca1fa;   /* The main blue for alternating segments */
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Poppins', Arial, sans-serif;
            background: linear-gradient(135deg, #eaf6ff 0%, #d4e9f7 100%);
            color: var(--dark-text);
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 1000px;
            background-color: var(--bg-color);
            border-radius: 20px;
            box-shadow: var(--shadow);
            padding: 30px 40px;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
            border-bottom: 2px solid var(--border-color);
            padding-bottom: 20px;
        }

        header h1 {
            color: var(--primary-color);
            font-size: 2.5em;
            font-weight: 700;
            text-transform: uppercase;
        }

        main {
            display: flex;
            flex-direction: column;
            gap: 40px;
        }

        .top-section {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 40px;
        }

        h2 {
            text-transform: uppercase;
            color: var(--primary-color);
            font-size: 1.5em;
            font-weight: 600;
            padding-bottom: 10px;
            border-bottom: 3px solid var(--secondary-color);
            margin-bottom: 20px;
        }
        
        .btn {
            padding: 12px 20px; border: none; border-radius: 8px;
            cursor: pointer; font-size: 1.1em; font-weight: 600;
            font-family: 'Poppins', sans-serif; transition: all 0.3s ease;
            display: inline-block; text-align: center;
        }
        .btn-primary {
            background-image: linear-gradient(45deg, var(--secondary-color) 0%, var(--primary-color) 100%);
            color: var(--light-text);
            width: 100%;
            box-shadow: 0 4px 15px rgba(12, 161, 250, 0.4);
        }
        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 7px 20px rgba(12, 161, 250, 0.5);
        }
        .btn-secondary {
            background-color: transparent;
            color: var(--primary-color);
            border: 2px solid var(--secondary-color);
            width: 100%;
            margin-top: 15px;
        }
        .btn-secondary:hover {
            background-color: var(--secondary-color);
            color: var(--light-text);
        }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: 600; }
        .form-group input {
            width: 100%; padding: 12px 15px;
            border: 2px solid var(--border-color);
            border-radius: 8px; font-family: 'Poppins', sans-serif; font-size: 1em;
            transition: border-color 0.3s, box-shadow 0.3s;
        }
        .form-group input:focus {
            outline: none; border-color: var(--secondary-color);
            box-shadow: 0 0 0 3px rgba(12, 161, 250, 0.2);
        }

        #entriesListContainer {
            background-color: var(--bg-light-gray);
            border: 2px solid var(--border-color);
            border-radius: 8px; padding: 10px;
            height: 250px; overflow-y: auto;
        }
        #entriesList { list-style-type: none; }
        #entriesList li {
            display: flex; justify-content: space-between; align-items: center;
            padding: 12px 15px; border-radius: 6px;
        }
        #entriesList li:nth-child(even) { background-color: #eaf6ff; }
        #entriesList li .value-text { font-weight: 600; word-break: break-all; padding-right: 10px; }
        #entriesList li .weight-text {
            color: var(--primary-color);
            background-color: rgba(12, 161, 250, 0.1);
            padding: 4px 10px; border-radius: 12px;
            font-size: 0.9em; font-weight: 600; white-space: nowrap;
        }
        .delete-btn {
            background: var(--accent-color); color: white; border: none; border-radius: 50%;
            width: 26px; height: 26px; cursor: pointer;
            font-weight: bold; line-height: 26px; text-align: center;
            margin-left: 10px; transition: background-color 0.3s, transform 0.2s;
        }
        .delete-btn:hover { background: #962d22; transform: scale(1.1); }
        
        .wheel-section {
            display: flex; justify-content: center; align-items: center;
            width: 100%; padding: 20px 0; margin-top: 20px;
        }
        .wheel-container {
            position: relative; width: 550px; height: 550px;
            display: flex; justify-content: center; align-items: center;
            filter: drop-shadow(0 10px 15px rgba(0,0,0,0.1));
        }
        .pointer {
            position: absolute; top: -25px; left: 50%;
            transform: translateX(-50%);
            width: 0; height: 0;
            border-left: 30px solid transparent; border-right: 30px solid transparent;
            border-top: 45px solid var(--accent-color);
            z-index: 10; filter: drop-shadow(0 4px 5px rgba(0,0,0,0.25));
            transition: transform 0.3s ease;
        }
        #wheelCanvas { transition: transform 7s cubic-bezier(0.1, 0.5, 0.2, 1); }
        #spinButton {
            position: absolute; width: 110px; height: 110px;
            border-radius: 50%;
            background: var(--bg-color); border: 12px solid var(--bg-color);
            box-shadow: var(--shadow);
            z-index: 5; color: var(--primary-color);
            text-transform: uppercase; font-size: 1.8em; font-weight: 700;
            display: flex; align-items: center; justify-content: center;
        }

        footer {
            margin-top: 40px; text-align: center; color: #7f8c8d;
            font-size: 1em; border-top: 2px solid var(--border-color);
            padding-top: 20px;
        }
        
        .modal { display: none; position: fixed; z-index: 100; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.6); align-items: center; justify-content: center; backdrop-filter: blur(5px); }
        .modal-content { background-color: var(--bg-color); padding: 40px; border-radius: 15px; width: 90%; max-width: 450px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.2); animation: zoomIn 0.5s cubic-bezier(0.165, 0.84, 0.44, 1); }
        @keyframes zoomIn { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        .modal-content h3 { font-size: 1.8em; color: var(--dark-text); margin-top: 0; margin-bottom: 15px; }
        .modal-result { font-size: 2.8em; font-weight: 700; color: var(--light-text); background-image: linear-gradient(45deg, var(--secondary-color) 0%, var(--primary-color) 100%); margin: 20px 0; padding: 20px; border-radius: 10px; }
        .close-button { margin-top: 20px; padding: 12px 30px; background-color: #95a5a6; color: white; }
        .close-button:hover { background-color: #7f8c8d; }

        @media (max-width: 992px) { .top-section { grid-template-columns: 1fr; } }
        @media (max-width: 600px) {
            body { padding: 10px; }
            .container { padding: 20px; }
            header h1 { font-size: 1.8em; }
            .wheel-container { width: 320px; height: 320px; }
            #wheelCanvas { width: 320px !important; height: 320px !important; }
            #spinButton { width: 80px; height: 80px; font-size: 1.2em; border-width: 8px;}
            .pointer { top: -15px; border-left-width: 20px; border-right-width: 20px; border-top-width: 30px;}
        }
    </style>
</head>
<body>
    <div class="container">
        <header><h1>Vòng Quay May Mắn</h1></header>
        <main>
            <div class="top-section" style="display:none;">
                <div class="input-form">
                    <h2>1. THIẾT LẬP</h2>
                    <div class="form-group">
                        <label for="valueInput">Tên phần thưởng / Lựa chọn</label>
                        <input type="text" id="valueInput" placeholder="VD: Thêm 1 lượt">
                    </div>
                    <div class="form-group">
                        <label for="weightInput">Tỷ lệ trúng (Trọng số)</label>
                        <input type="number" id="weightInput" placeholder="VD: 1 (Số càng lớn, càng dễ trúng)">
                    </div>
                    <button id="addButton" class="btn btn-primary">Thêm vào Vòng quay</button>
                    <label for="uploadInput" class="btn btn-secondary">Tải lên danh sách (.json)</label>
                    <input type="file" id="uploadInput" accept=".json" style="display: none;">
                </div>
                <div class="entries-list-section">
                    <h2>2. DANH SÁCH HIỆN TẠI</h2>
                    <div id="entriesListContainer"><ul id="entriesList"></ul></div>
                    <button id="downloadButton" class="btn btn-secondary">Tải xuống danh sách</button>
                </div>
            </div>
            <div class="wheel-section">
                <div class="wheel-container">
                    <div class="pointer"></div>
                    <canvas id="wheelCanvas" width="550" height="550"></canvas>
                    <button id="spinButton" class="btn">QUAY</button>
                </div>
            </div>
        </main>
        <footer><p>Nệm Việt Hàn </p></footer>
    </div>
    <div id="resultModal" class="modal">
        <div class="modal-content">
            <h3>KẾT QUẢ QUAY SỐ LÀ...</h3>
            <p id="modalResultText" class="modal-result"></p>
            <button id="closeModalButton" class="btn close-button">Chơi lại</button>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const valueInput = document.getElementById('valueInput'),
                  weightInput = document.getElementById('weightInput'),
                  addButton = document.getElementById('addButton'),
                  entriesList = document.getElementById('entriesList'),
                  wheelCanvas = document.getElementById('wheelCanvas'),
                  spinButton = document.getElementById('spinButton'),
                  resultModal = document.getElementById('resultModal'),
                  modalResultText = document.getElementById('modalResultText'),
                  closeModalButton = document.getElementById('closeModalButton'),
                  uploadInput = document.getElementById('uploadInput'),
                  downloadButton = document.getElementById('downloadButton');

            const ctx = wheelCanvas.getContext('2d');
            let entries = [
                { value: 'Voucher 50K', weight: 2 },
                { value: ' Voucher 100k', weight: 3 },
                { value: 'Voucher 5%', weight: 2 },
                { value: 'Gối ôm xanh', weight: 2 },
                { value: 'Voucher 200K', weight: 1.5 },
                { value: 'Voucher 3%', weight: 2.5 },
            ];
            let currentRotation = 0;
            const centerX = wheelCanvas.width / 2;
            const centerY = wheelCanvas.height / 2;

            const renderEntries = () => {
                entriesList.innerHTML = '';
                if(entries.length === 0){
                    entriesList.innerHTML = '<li style="justify-content: center; color: #7f8c8d;">Chưa có giá trị nào.</li>';
                } else {
                    entries.forEach((entry, index) => {
                        const li = document.createElement('li');
                        li.innerHTML = `
                            <span class="value-text">${entry.value}</span>
                            <div>
                                <span class="weight-text">Tỷ lệ: ${entry.weight}</span>
                                <button class="delete-btn" data-index="${index}">X</button>
                            </div>
                        `;
                        entriesList.appendChild(li);
                    });
                }
                drawWheel();
            };

            const drawWheel = () => {
                const totalWeight = entries.reduce((sum, entry) => sum + entry.weight, 0);
                const radius = centerX - 10;
                
                const colorLight = getComputedStyle(document.documentElement).getPropertyValue('--wheel-color-light').trim();
                const colorDark = getComputedStyle(document.documentElement).getPropertyValue('--wheel-color-dark').trim();
                const textColor = getComputedStyle(document.documentElement).getPropertyValue('--dark-text').trim();
                const textOnDarkColor = getComputedStyle(document.documentElement).getPropertyValue('--light-text').trim();

                ctx.clearRect(0, 0, wheelCanvas.width, wheelCanvas.height);
                
                if (entries.length === 0) {
                    ctx.beginPath();
                    ctx.arc(centerX, centerY, radius, 0, 2 * Math.PI);
                    ctx.fillStyle = '#f0f0f0';
                    ctx.fill();
                    ctx.fillStyle = '#aaa';
                    ctx.font = '600 18px Poppins';
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillText('Thêm giá trị để tạo vòng quay', centerX, centerY);
                    return;
                }

                let startAngle = 0;
                
                entries.forEach((entry, index) => {
                    const sliceAngle = (entry.weight / totalWeight) * 2 * Math.PI;
                    const endAngle = startAngle + sliceAngle;
                    const isDarkSegment = index % 2 !== 0;

                    ctx.beginPath();
                    ctx.moveTo(centerX, centerY);
                    ctx.arc(centerX, centerY, radius, startAngle, endAngle);
                    ctx.closePath();
                    
                    ctx.fillStyle = isDarkSegment ? colorDark : colorLight;
                    ctx.fill();
                    
                    ctx.save();
                    ctx.strokeStyle = '#fff';
                    ctx.lineWidth = 2;
                    ctx.moveTo(centerX, centerY);
                    ctx.lineTo(centerX + Math.cos(startAngle) * radius, centerY + Math.sin(startAngle) * radius);
                    ctx.stroke();
                    ctx.restore();

                    ctx.save();
                    ctx.translate(centerX, centerY);
                    ctx.rotate(startAngle + sliceAngle / 2);
                    ctx.textAlign = 'center';
                    // Use white text on dark (blue) segments and dark text on light segments
                    ctx.fillStyle = isDarkSegment ? textOnDarkColor : textColor;
                    ctx.font = '600 16px Poppins';
                    
                    let text = entry.value;
                    if (text.length > 20) text = text.substring(0, 17) + '...';
                    
                    ctx.fillText(text, radius * 0.65, 5);
                    ctx.restore();

                    startAngle = endAngle;
                });
            };
            
            const spin = () => {
                if (entries.length < 2) {
                    alert('Vui lòng nhập ít nhất 2 giá trị để quay.'); return;
                }
                spinButton.disabled = true;
                const spinDuration = 7000;
                const spinRotations = 10;
                const randomStopAngle = Math.random() * 360;
                const totalRotation = spinRotations * 360 + randomStopAngle;
                
                wheelCanvas.style.transition = 'none';
                wheelCanvas.style.transform = `rotate(${currentRotation % 360}deg)`;
                wheelCanvas.offsetHeight; 

                currentRotation += totalRotation;
                wheelCanvas.style.transition = `transform ${spinDuration / 1000}s cubic-bezier(0.1, 0.5, 0.2, 1)`;
                wheelCanvas.style.transform = `rotate(${currentRotation}deg)`;

                setTimeout(() => {
                    spinButton.disabled = false;
                    const finalWheelAngle = currentRotation % 360;
                    const winningAngle = (360 - finalWheelAngle + 270) % 360;
                    const winner = getWinner(winningAngle);
                    
                    modalResultText.textContent = winner.value;
                    resultModal.style.display = 'flex';
                }, spinDuration + 100);
            };

            const getWinner = (finalAngleDegrees) => {
                const totalWeight = entries.reduce((sum, entry) => sum + entry.weight, 0);
                let cumulativeAngle = 0;
                for (const entry of entries) {
                    const sliceAngleDegrees = (entry.weight / totalWeight) * 360;
                    cumulativeAngle += sliceAngleDegrees;
                    if (finalAngleDegrees < cumulativeAngle) return entry;
                }
                return entries[0];
            };
            
            const addEntry = () => {
                const value = valueInput.value.trim();
                const weight = parseFloat(weightInput.value);
                if (value === '') { alert('Vui lòng nhập giá trị.'); return; }
                if (isNaN(weight) || weight <= 0) { alert('Tỷ lệ phải là một số lớn hơn 0.'); return; }
                entries.push({ value, weight });
                valueInput.value = '';
                weightInput.value = '';
                renderEntries();
            };

            const deleteEntry = (index) => {
                entries.splice(index, 1);
                renderEntries();
            };
            
            const downloadList = () => {
                if (entries.length === 0) {
                    alert('Danh sách đang trống, không có gì để tải xuống.');
                    return;
                }
                const jsonString = JSON.stringify(entries, null, 2);
                const blob = new Blob([jsonString], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = 'danh-sach-vong-quay.json';
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
            };

            const uploadList = (event) => {
                const file = event.target.files[0];
                if (!file) return;

                const reader = new FileReader();
                reader.onload = (e) => {
                    try {
                        const parsedData = JSON.parse(e.target.result);
                        if (Array.isArray(parsedData) && parsedData.every(item => 'value' in item && 'weight' in item)) {
                            entries = parsedData;
                            renderEntries();
                            alert('Tải lên danh sách thành công!');
                        } else {
                            throw new Error('Cấu trúc file JSON không hợp lệ.');
                        }
                    } catch (error) {
                        alert('Lỗi: Không thể đọc file hoặc file không đúng định dạng. Vui lòng kiểm tra lại file .json.');
                    } finally {
                        uploadInput.value = '';
                    }
                };
                reader.onerror = () => {
                    alert('Đã xảy ra lỗi khi đọc file.');
                };
                reader.readAsText(file);
            };

            // Event Listeners
            addButton.addEventListener('click', addEntry);
            weightInput.addEventListener('keypress', (e) => { if(e.key === 'Enter') addEntry(); });
            entriesList.addEventListener('click', (e) => {
                if (e.target.classList.contains('delete-btn')) {
                    deleteEntry(parseInt(e.target.getAttribute('data-index'), 10));
                }
            });
            spinButton.addEventListener('click', spin);
            closeModalButton.addEventListener('click', () => { resultModal.style.display = 'none'; });
            window.addEventListener('click', (event) => { if (event.target == resultModal) { resultModal.style.display = 'none'; } });
            
            downloadButton.addEventListener('click', downloadList);
            uploadInput.addEventListener('change', uploadList);

            // Initial Render
            renderEntries();
        });
    </script>
</body>
</html>
